<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pizza Pot v0.2</title>

<style>
body {
  background: #1c1c1c;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: space-around;
  padding: 20px;
  font-size: 18px;
}

.board-wrapper {
  position: relative;
  width: 420px;
  height: 420px;
  margin: 20px auto;
  border-radius: 50%;
  overflow: hidden;
}
/*.board-wrapper::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9;

  background:
  radial-gradient(circle at 20% 80%, rgba(255,220,150,0.5) 0 8%, transparent 10%),
  radial-gradient(circle at 75% 25%, rgba(255,200,120,0.45) 0 7%, transparent 10%),
  radial-gradient(circle at 60% 70%, rgba(0,0,0,0.35) 0 6%, transparent 10%),
  radial-gradient(circle at 35% 30%, rgba(255,210,140,0.4) 0 7%, transparent 10%),
  radial-gradient(circle at 50% 20%, rgba(120,70,20,0.4) 0 5%, transparent 10%),
  radial-gradient(circle at 80% 60%, rgba(90,50,10,0.35) 0 6%, transparent 10%);

  filter: none;
} */

.board-wrapper::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  z-index: 10;

 /* Base crust color */
background:
  radial-gradient(circle at center,
    transparent 0%,
    transparent 62%,
    #8a4a1f 64%,
    #c47a33 68%,
    #e0943f 72%,
    #c26a2a 82%,
    #7a3f16 92%,
    #2b1408 98%
  );

opacity: 1;
transform: scale(1.03, 1.01) rotate(0.5deg);

  /* Puffy highlights */
  box-shadow:
  inset 0 0 8px rgba(0,0,0,0.2),
  0 0 12px rgba(0,0,0,0.5);

}

.board {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: absolute;
  z-index: 1;

  background:
    radial-gradient(circle at center, #ffd87a 0%, #ffc44d 70%, #f5b94c 100%),
    conic-gradient(
  #ffd87a 0deg 22.5deg,
  #ffc44d 22.5deg 45deg,
  #ffd87a 45deg 67.5deg,
  #ffc44d 67.5deg 90deg,
  #ffd87a 90deg 112.5deg,
  #ffc44d 112.5deg 135deg,
  #ffd87a 135deg 157.5deg,
  #ffc44d 157.5deg 180deg,  #ffd87a 180deg 202.5deg,
  #ffc44d 202.5deg 225deg,
  #ffd87a 225deg 247.5deg,
  #ffc44d 247.5deg 270deg,
  #ffd87a 270deg 292.5deg,
  #ffc44d 292.5deg 315deg,
  #ffd87a 315deg 337.5deg,
  #ffc44d 337.5deg 360deg
);

  box-shadow:
    inset 0 0 30px rgba(0,0,0,.35),
    0 0 20px rgba(0,0,0,.5);
}

#pizzaBoard {
  position: absolute;
  top: 0;
  left: 0;
  width: 420px;
  height: 420px;
  z-index: 2;
}

.slice {
  position: absolute;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.slice-number {
  position: absolute;
  font-size: 16px;
  pointer-events: none;
  z-index: 4;
  color: #1c1c1c;
  font-weight: bold;
}
.state-panel {
  margin-top: 20px;
  font-size: 18px;
}

.offer-panel {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #222;
  padding: 20px;
}

button {
  padding: 10px 20px;
  margin: 10px;
}

.slice-pop {
  transform-origin: 210px 210px;
  animation: slicePop 0.18s ease;
}

@keyframes slicePop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}

/* ⭐ Golden slice glow */

.golden-slice {
  stroke: gold;
  stroke-width: 4;
  animation: goldenPulse 1.2s infinite;
}

@keyframes goldenPulse {
  0% {
    filter: drop-shadow(0 0 6px gold);
    stroke-width: 3;
  }
  50% {
    filter: drop-shadow(0 0 28px gold);
    stroke-width: 8;
  }
  100% {
    filter: drop-shadow(0 0 6px gold);
    stroke-width: 3;
  }
}

.golden-flash {
  animation: goldenFlash 0.35s ease-out;
}

@keyframes goldenFlash {
  0% {
    filter: drop-shadow(0 0 0px gold);
    stroke-width: 2;
  }
  50% {
    filter: drop-shadow(0 0 35px gold);
    stroke-width: 10;
  }
  100% {
    filter: drop-shadow(0 0 6px gold);
    stroke-width: 4;
  }
}

/* 🍕 Premium slice glow */
.premium-slice {
  stroke: #ffb347;
  stroke-width: 4;
  filter: drop-shadow(0 0 12px rgba(255, 180, 80, 0.9));
}

#pizzaBoard path {
  transition: filter 0.2s ease;
}

#pizzaBoard path:hover {
  filter: brightness(1.3);
  cursor: pointer;
}

</style>
</head>
<body>

<div class="top-bar">
  <div>Pot: <span id="pot">1000</span></div>
  <div>Accumulated: <span id="percent">0</span>%</div>
  <div>💰 Payout: <span id="win">0</span></div>
  <div>🚀 Full Value: <span id="rawWin">0</span></div>
</div>

<div id="spotlightBanner" style="margin-top:10px;font-size:22px;font-weight:bold;">
🎯 Spotlight Player: —
</div>

<div class="board-wrapper" id="boardWrapper">
  <div class="board"></div>
  <svg id="pizzaBoard" width="420" height="420" viewBox="0 0 420 420">
<defs>

  <!-- 🔥 Burnt gradient -->
  <radialGradient id="burntTexture" cx="50%" cy="50%" r="75%">
  <stop offset="0%" stop-color="#6b4f3a"/>
  <stop offset="30%" stop-color="#4a3728"/>
  <stop offset="60%" stop-color="#2a1f18"/>
  <stop offset="85%" stop-color="#14110f"/>
  <stop offset="100%" stop-color="#050505"/>
</radialGradient>


</defs>
<g id="pepperoniLayer"></g>
</svg>
</div>


<button onclick="pickSpotlight()" style="margin-top:10px;padding:10px 20px;font-size:18px;">
🎲 Pick Spotlight Player
</button>

<div id="spotlightName" style="margin-top:10px;font-size:22px;"></div>

<div class="state-panel">
  Strikes: <span id="strikes">0</span> of 3 |
  Burnt Left: <span id="burntRemaining">4</span> |
  Slices Revealed: <span id="revealedCount">0</span>
</div>

<div class="offer-panel" id="offerPanel">
  <div>Chef Offer: <span id="offerValue"></span></div>
  <div>Time left: <span id="timer">12</span></div>
  <button onclick="acceptOffer()">Accept</button>
  <button onclick="declineOffer()">Decline</button>
</div>

<script>
let pot = 1000;
let accumulated = 0;
let strikes = 0;
let revealed = 0;
let burntRemaining = 4;
let premiumIndex = null;
let premiumActive = false;
let premiumCount = 0;
let goldenCount = 0;
let offerTimer;
let timeLeft = 12;
let offerActive = false;
let gameActive = true;
let boostQueue = [];
let boostRunning = false;
let revealedMap = new Array(16).fill(false);

let values = [];
const PLAYER_PAYOUT_PERCENT = 0.50;

/* 🎁 FAVORITED GIFT VALUE MAP */
const giftValues = {

  "Galaxy": 1,
  "Hydrate": 1,
  "Hot Dog": 1,
  "Donut": 1,

  "What's Up Brother": 5,
  "Pizza": 5,

  "Spicy": 10,
  "Dino": 10,

  "Taco": 25,
  "Tuned In": 25,

  "Hand Hearts": 50,
  "Corgi": 50,

  "Boxing Gloves": 199,

  "Orca": 249
};

const svg = document.getElementById("pizzaBoard");

const centerX = 210;
const centerY = 210;
const pizzaRadius = 200;

// 1️⃣ CREATE SLICE PATHS (click areas)
for (let i = 0; i < 16; i++) {

  const startAngle = (i * 22.5) * Math.PI / 180;
  const endAngle = ((i + 1) * 22.5) * Math.PI / 180;

  const x1 = centerX + pizzaRadius * Math.cos(startAngle);
  const y1 = centerY + pizzaRadius * Math.sin(startAngle);

  const x2 = centerX + pizzaRadius * Math.cos(endAngle);
  const y2 = centerY + pizzaRadius * Math.sin(endAngle);

  const pathData = `
    M ${centerX} ${centerY}
    L ${x1} ${y1}
    A ${pizzaRadius} ${pizzaRadius} 0 0 1 ${x2} ${y2}
    Z
  `;

  const slice = document.createElementNS("http://www.w3.org/2000/svg", "path");
  slice.setAttribute("d", pathData);
  slice.setAttribute("fill", "transparent");
  slice.dataset.index = i;

  slice.addEventListener("click", () => revealSlice(slice));

  svg.appendChild(slice);
}


// 2️⃣ DRAW DIVIDER LINES (visual slice cuts)

for (let i = 0; i < 16; i++) {

 const angle = (i * 22.5) * Math.PI / 180;

  const x = centerX + pizzaRadius * Math.cos(angle);
  const y = centerY + pizzaRadius * Math.sin(angle);

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

  line.setAttribute("x1", centerX);
  line.setAttribute("y1", centerY);
  line.setAttribute("x2", x);
  line.setAttribute("y2", y);

  line.setAttribute("stroke", "#8b4a1a");
  line.setAttribute("stroke-width", "3");

  svg.appendChild(line);
}


// 3️⃣ ADD NUMBERS LAST (so they appear above everything)

for (let i = 0; i < 16; i++) {

  const number = document.createElement("div");
  number.className = "slice-number";
  number.innerText = i + 1;

  const angle = (i * 22.5 + 11.25) * Math.PI / 180;
  const radius = 160;

  number.style.left = 210 + radius * Math.cos(angle) - 8 + "px";
  number.style.top = 210 + radius * Math.sin(angle) - 8 + "px";

  number.id = "num-" + i;

  boardWrapper.appendChild(number);

}

setupValues();
generatePepperoni();

function revealSlice(slice) {

  if (slice.dataset.revealed || offerActive) return;

  const index = Number(slice.dataset.index);
  let value = values[index];


  // remove golden preview icon
  const goldenIcon = document.querySelector('[data-golden-icon="' + index + '"]');
  if (goldenIcon) goldenIcon.remove();

  // remove premium preview icon
  const premiumIcon = document.querySelector('[data-premium-icon="' + index + '"]');
  if (premiumIcon) premiumIcon.remove();

  let isPremium = slice.dataset.premium === "true";
  let isGolden = slice.dataset.golden === "true";

  // 🔒 force value to match boosts
  const isBurnt = value === "burnt";

if (isGolden) {
  value = "gold";
} else if (isPremium && !isBurnt) {
  value = 15;
}

if (revealed < 2 && value === "burnt") {

  const safeValues = [5, 10];
  value = safeValues[Math.floor(Math.random() * safeValues.length)];
}

slice.dataset.revealed = true;
 revealedMap[index] = true;
 slice.style.opacity = 0.85;

  const peps = document.querySelectorAll('[data-slice="' + index + '"]');
  peps.forEach(p => p.style.opacity = 0);

  slice.classList.add("slice-pop");
  setTimeout(() => {
    slice.classList.remove("slice-pop");
  }, 180);

  const numLabel = document.getElementById("num-" + index);
  numLabel.innerText = "";


// ⭐ GOLDEN
if (isGolden) {

  slice.dataset.revealed = true;
  revealedMap[index] = true;

  slice.setAttribute("fill", "#333");

  accumulated = Math.min(accumulated * 2, 100);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");

  const angle = (index * 22.5 + 11.25) * Math.PI / 180;
  const r = 105;

  const x = 210 + r * Math.cos(angle);
  const y = 210 + r * Math.sin(angle);

  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.setAttribute("fill", "#ffd700");
  text.setAttribute("font-size", "18");
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");

  text.innerHTML = `
    <tspan x="${x}" dy="-8">⭐</tspan>
    <tspan x="${x}" dy="16">x2</tspan>
  `;

  svg.appendChild(text);

  const rawWin = pot * (accumulated / 100);
  Math.floor(rawWin * PLAYER_PAYOUT_PERCENT)

  document.getElementById("percent").innerText = accumulated;
  document.getElementById("win").innerText = payout;
  document.getElementById("rawWin").innerText = Math.floor(rawWin);

  return;
}


// 🔥 BURNT
else if (value === "burnt") {

  slice.setAttribute("fill", "url(#burntTexture)");
  slice.setAttribute("stroke", "#2a1a12");
  slice.setAttribute("stroke-width", "3");

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");

  const angle = (index * 22.5 + 11.25) * Math.PI / 180;
  const r = 105;

  const x = 210 + r * Math.cos(angle);
  const y = 210 + r * Math.sin(angle);

  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.setAttribute("fill", "white");
  text.setAttribute("font-size", "14");
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");

  text.innerHTML = `
    <tspan x="${x}" dy="-6">🔥</tspan>
    <tspan x="${x}" dy="14">BURNT</tspan>
  `;

  svg.appendChild(text);

  strikes++;

  document.getElementById("strikes").innerText = strikes;
  document.getElementById("burntRemaining").innerText =
    values.filter((v, i) => !revealedMap[i] && v === "burnt").length;

  if (strikes === 3) return endRound("3 Strikes!");
}

// 🍕 NORMAL + PREMIUM
else {

  slice.setAttribute("fill", "#666");

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");

  const angle = (index * 22.5 + 11.25) * Math.PI / 180;
  const r = 105;

  const offset = isPremium ? 10 : 0;

  const x = 210 + (r - offset) * Math.cos(angle);
  const y = 210 + (r - offset) * Math.sin(angle);

  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");

  let reward = typeof value === "number" ? value : 0;

  if (isPremium) {
    reward = 15;
  }

  if (accumulated < 100) {
  accumulated += reward;
} else {
  accumulated += reward * 0.5;
}

  text.setAttribute("fill", "#f0f0f0");
  text.setAttribute("font-size", "18");

  if (isPremium) {

    const icon = document.createElementNS("http://www.w3.org/2000/svg", "text");
    icon.setAttribute("x", x);
    icon.setAttribute("y", y - 8);
    icon.setAttribute("text-anchor", "middle");
    icon.setAttribute("dominant-baseline", "middle");
    icon.setAttribute("font-size", "22");
    icon.setAttribute("fill", "#f0f0f0");
    icon.textContent = "🍕";

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", x);
    label.setAttribute("y", y + 12);
    label.setAttribute("text-anchor", "middle");
    label.setAttribute("dominant-baseline", "middle");
    label.setAttribute("font-size", "14");
    label.setAttribute("fill", "#f0f0f0");
    label.textContent = "+15%";

    document.getElementById("pizzaBoard").appendChild(icon);
    document.getElementById("pizzaBoard").appendChild(label);

  } else {

    text.textContent = "+" + reward + "%";
    svg.appendChild(text);

  }

 // update UI
revealed++;
document.getElementById("revealedCount").innerText = revealed;

const rawWin = pot * (accumulated / 100);
Math.floor(rawWin * PLAYER_PAYOUT_PERCENT)

document.getElementById("percent").innerText = accumulated;
document.getElementById("win").innerText = payout;
document.getElementById("rawWin").innerText = Math.floor(rawWin);

if (revealed === 16) {
  return endRound("YOU CLEARED THE PIZZA! 🍕🔥");
}

if (!offerActive && revealed >= 2 && Math.random() < 0.4) {
  showOffer();
}

}

// ✅ CLOSE revealSlice FUNCTION
}

function setSlicesClickable(enabled) {
  const slices = document.querySelectorAll(".slice");
  slices.forEach(slice => {
    slice.style.pointerEvents = enabled ? "auto" : "none";
  });
}

function showOffer() {
  document.getElementById("offerPanel").style.display = "block";
  offerActive = true;
  setSlicesClickable(false);

  const rawWin = pot * (accumulated / 100);
  Math.floor(rawWin * PLAYER_PAYOUT_PERCENT)
  let offerMultiplier = 0.85;

if (accumulated < 50) {
  offerMultiplier = 0.95; // early game
} else if (accumulated < 100) {
  offerMultiplier = 0.9; // mid game
} else {
  offerMultiplier = 0.8; // late game
}

const offer = Math.floor(payout * offerMultiplier);
  document.getElementById("offerValue").innerText = offer;
  timeLeft = 12;
  document.getElementById("timer").innerText = timeLeft;

  offerTimer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if (timeLeft <= 0) declineOffer();
  }, 1000);
}

function acceptOffer() {
  clearInterval(offerTimer);
  offerActive = false;
  setSlicesClickable(true);
  endRound("Accepted Offer");
}

function declineOffer() {
  clearInterval(offerTimer);
  offerActive = false;
  setSlicesClickable(true);
  document.getElementById("offerPanel").style.display = "none";
}

function endRound(reason) {

  gameActive = false;
  
  const rawWin = pot * (accumulated / 100);
  Math.floor(rawWin * PLAYER_PAYOUT_PERCENT)

  document.getElementById("endMessage").innerText = "Round Complete";
  document.getElementById("endDetails").innerText =
    reason + " | Final: " + accumulated + "% | Payout: " + payout;

  document.getElementById("endOverlay").style.display = "flex";
}

function startNewRound() {
  location.reload();
}

function mediumBoost(username = "Someone") {

  if (premiumCount >= 2) {

    if (accumulated < 100) {
  accumulated += 2;
} else {
  accumulated += 1;
}

    showBoostMessage("🍕 Bonus Boost by " + username + "! +2%", "bonus");

    document.getElementById("percent").innerText = accumulated;
    const rawWin = pot * (accumulated / 100);
    Math.floor(rawWin * PLAYER_PAYOUT_PERCENT)

    document.getElementById("win").innerText = payout;
    document.getElementById("rawWin").innerText = Math.floor(rawWin);

    return;
  }

  const slices = document.querySelectorAll("#pizzaBoard path[data-index]");

  let eligible = [];

  slices.forEach((slice, i) => {
  if (!slice.dataset.revealed && i !== premiumIndex && slice.dataset.golden !== "true") {
    eligible.push(i);
  }
});

  if (eligible.length === 0) return;

  const newIndex = eligible[Math.floor(Math.random() * eligible.length)];

  premiumIndex = newIndex;
  premiumActive = true;
  premiumCount++;

  showBoostMessage("🍕 Premium Slice Added by " + username + "!");

  glowSlice(newIndex);
}

function goldenBoost(username = "Someone") {

  if (goldenCount >= 1) {

    if (accumulated < 100) {
  accumulated += 2;
} else {
  accumulated += 1;
}

    showBoostMessage("⭐ Bonus Boost by " + username + "! +2%", "bonus");

    const rawWin = pot * (accumulated / 100);
    Math.floor(rawWin * PLAYER_PAYOUT_PERCENT)

    document.getElementById("win").innerText = payout;
    document.getElementById("rawWin").innerText = Math.floor(rawWin);

    return;
  }

  const slices = document.querySelectorAll("#pizzaBoard path");

  let eligible = [];

  slices.forEach((slice, i) => {
  if (!slice.dataset.revealed && slice.dataset.premium !== "true") {
    eligible.push(i);
  }
});

  if (eligible.length === 0) return;

  const newIndex = eligible[Math.floor(Math.random() * eligible.length)];

  goldenCount++;

  showBoostMessage("⭐ Golden Slice Added by " + username + "!");

  glowGoldenSlice(newIndex);

}

function showBoostMessage(text, type="normal") {

  const msg = document.createElement("div");
  msg.innerText = text;

  msg.style.position = "fixed";
  msg.style.top = "20%";
  msg.style.left = "50%";
  msg.style.transform = "translateX(-50%)";
  msg.style.padding = "15px 30px";
  msg.style.fontSize = "24px";
  msg.style.borderRadius = "10px";
  msg.style.zIndex = "2000";

  if(type === "bonus"){
    msg.style.background = "#1f5e2a";
    msg.style.color = "#8fff9c";
    msg.style.boxShadow = "0 0 20px #3cff72";
  } else {
    msg.style.background = "#222";
    msg.style.color = "white";
  }

  document.body.appendChild(msg);

  setTimeout(() => {
    msg.remove();
  }, 2200);

}

function getBoostTier(amount){

  if (amount >= 249) return "ultra";
  if (amount >= 199) return "gold";
  if (amount >= 50) return "premium";

  return "pot";
}

function processGift({ username, amount }) {
  handleGift(amount, username);
}

function handleGift(amount, username) {

  // normalize incoming values
  amount = Number(amount);
  if (!username) username = "Someone";

  // ignore bad or zero values
  if (!amount || amount <= 0) return;

  // 🧠 store gifters
  if (!window.giftUsers) window.giftUsers = [];

  if (!window.giftUsers.includes(username)) {
    window.giftUsers.push(username);
  }

  // 🎯 spotlight the gifter
  document.getElementById("spotlightName").innerText = username;

  if (!gameActive) return;

  console.log("Gift received:", username, "value:", amount);

  boostQueue.push({ amount, username });
  runBoostQueue();
}

function onFavoritedGift(username, giftName) {

  // 🔍 Log unknown gifts so you can add them later

  if (!giftValues[giftName]) {
    console.log("⚠️ Unknown gift:", giftName);
  }

  // 🎁 Convert gift name → value
  const amount = giftValues[giftName] || 1;

  // 🚀 Send into your existing system
  processGift({ username, amount });
}

function runBoostQueue() {

  if (boostRunning) return;
  if (boostQueue.length === 0) return;

  boostRunning = true;

  const boost = boostQueue.shift();

  const {amount, username} = boost;

  const tier = getBoostTier(amount);

if (tier === "pot") {

  pot += amount;

  showBoostMessage("💰 " + username + " added " + amount + " to the pot!");

  document.getElementById("pot").innerText = pot;

}
else if (tier === "premium") {
  mediumBoost(username);
}
else if (tier === "gold") {
  goldenBoost(username);
}
else if (tier === "ultra") {
  ultraBoost(username);
}

  setTimeout(() => {

    boostRunning = false;
    runBoostQueue();

  }, 500);

}

function saveBurntSlice() {

  // find all burnt slices
  const burntIndexes = values
    .map((v, i) => v === "burnt" ? i : -1)
    .filter(i => i !== -1);

  if (burntIndexes.length === 0) return;

  // pick one randomly
  const index = burntIndexes[Math.floor(Math.random() * burntIndexes.length)];

  // convert it to something safe
  values[index] = 10; // or "safe" or whatever your normal value is

  // update the UI (this part may vary slightly)
  const slice = document.querySelectorAll("#pizzaBoard path")[index];
  if (slice) {
    slice.classList.remove("burnt");
    slice.classList.add("saved"); // optional visual class
  }

  console.log("🔥 Burnt slice saved at index:", index);
}

function glowSlice(index) {

  const slices = document.querySelectorAll("#pizzaBoard path");
  const slice = slices[index];

  slice.dataset.premium = "true";
  slice.dataset.golden = "false";
  slice.classList.add("premium-slice");
  slice.setAttribute("fill", "#ffd27a");

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("data-premium-icon", index);

  const angle = (index * 22.5 + 11.25) * Math.PI / 180;
  const r = 105;

  const x = 210 + r * Math.cos(angle);
  const y = 210 + r * Math.sin(angle);

  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.setAttribute("font-size", "26");
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");

  text.textContent = "🍕";

  svg.appendChild(text);

  slice.style.stroke = "yellow";
  slice.style.strokeWidth = "4";

  setTimeout(() => {
    slice.style.stroke = "";
    slice.style.strokeWidth = "";
  }, 600);

}

function setupValues() {

revealedMap = new Array(16).fill(false);

  values = [
    "burnt","burnt","burnt","burnt",

    3,3,3,3,3,
    5,5,5,5,5,
    8,8,
    12
  ];

  // Fisher-Yates shuffle
  for (let i = values.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [values[i], values[j]] = [values[j], values[i]];
  }

}

function generatePepperoni() {

  revealedMap = new Array(16).fill(false);

  const layer = document.getElementById("pepperoniLayer");
  if (!layer) return;

  layer.innerHTML = "";

  const centerX = 210;
  const centerY = 210;
  const radius = 165;

  const count = 20; // fuller pizza

  const placed = [];

  for (let i = 0; i < count; i++) {

    let tries = 0;
    let placedSuccessfully = false;

    while (!placedSuccessfully && tries < 15) {

      // evenly spaced base angle
      const baseAngle = (i * (Math.PI * 2)) / count;

      // slight randomness
      const angleOffset = (Math.random() - 0.5) * 0.5;
      const angle = baseAngle + angleOffset;

      // ring placement
      const distance = (0.5 + Math.random() * 0.4) * radius;

      const x = centerX + Math.cos(angle) * distance;
      const y = centerY + Math.sin(angle) * distance;

      // spacing check
      let tooClose = false;

      for (let p of placed) {
        const dx = p.x - x;
        const dy = p.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 32) {
          tooClose = true;
          break;
        }
      }

      if (!tooClose) {

        placed.push({ x, y });

        const size = 10 + Math.random() * 2;

        const pep = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        // determine slice based on angle
        const sliceIndex = Math.floor((angle / (Math.PI * 2)) * 16);
        pep.setAttribute("data-slice", sliceIndex);

        pep.setAttribute("cx", x);
        pep.setAttribute("cy", y);
        pep.setAttribute("r", size);

        const reds = ["#b22222", "#a01d1d", "#c12a2a"];
        const color = reds[Math.floor(Math.random() * reds.length)];

        pep.setAttribute("fill", color);
        pep.setAttribute("stroke", "#7a0f0f");
        pep.setAttribute("stroke-width", "2");
        pep.setAttribute("opacity", "0.95");

        layer.appendChild(pep);

        placedSuccessfully = true;
      }

      tries++;
    }
  }
}
